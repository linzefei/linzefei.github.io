<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words · linzefei</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000308;
            color: rgba(255,255,255,0.78);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
        }

        /* ── Header ── */
        header {
            position: sticky; top: 0; z-index: 10;
            padding: 14px 24px;
            border-bottom: 1px solid rgba(140,200,255,0.07);
            background: rgba(0,3,8,0.94);
            backdrop-filter: blur(16px);
            display: flex; align-items: center; gap: 14px;
        }
        header a {
            color: rgba(140,200,255,0.4);
            text-decoration: none;
            font-size: 11px; letter-spacing: 2px;
            transition: color .2s;
        }
        header a:hover { color: rgba(140,200,255,0.85); }
        .header-sep { color: rgba(255,255,255,0.1); }
        header h1 {
            font-size: 11px; letter-spacing: 5px; font-weight: 400;
            color: rgba(255,255,255,0.3); text-transform: uppercase;
        }

        /* ── Layout ── */
        .container { max-width: 680px; margin: 0 auto; padding: 36px 20px 80px; }

        /* ── Section ── */
        .section { margin-bottom: 48px; }
        .section-label {
            font-size: 9px; letter-spacing: 4px; text-transform: uppercase;
            color: rgba(140,200,255,0.28);
            margin-bottom: 16px;
            display: flex; align-items: center; gap: 10px;
        }
        .section-label::after {
            content: ''; flex: 1; height: 1px;
            background: rgba(140,200,255,0.06);
        }

        /* ── Identity card ── */
        .identity-card {
            background: rgba(140,200,255,0.025);
            border: 1px solid rgba(140,200,255,0.09);
            border-radius: 14px; padding: 20px 22px;
        }
        .identity-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(140,200,255,0.08);
            border: 1px solid rgba(140,200,255,0.15);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0;
        }
        .name-display {
            font-size: 17px; font-weight: 300; letter-spacing: 1px; flex: 1;
        }
        .edit-btn {
            background: none;
            border: 1px solid rgba(140,200,255,0.2);
            border-radius: 6px; color: rgba(140,200,255,0.5);
            font-size: 10px; letter-spacing: 1.5px;
            padding: 4px 10px; cursor: pointer; transition: all .2s;
        }
        .edit-btn:hover { border-color: rgba(140,200,255,0.6); color: rgba(140,200,255,0.9); }

        .identity-meta {
            font-size: 10px; color: rgba(255,255,255,0.18);
            font-family: monospace; display: flex; gap: 14px; flex-wrap: wrap;
        }

        /* Name editor */
        .name-editor { display: none; margin-top: 14px; flex-direction: column; gap: 8px; }
        .name-editor.open { display: flex; }
        .name-input-row { display: flex; gap: 8px; }
        .name-input {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(140,200,255,0.18);
            border-radius: 8px; color: #fff;
            font-size: 13px; padding: 8px 12px; outline: none;
            transition: border-color .2s;
        }
        .name-input:focus { border-color: rgba(140,200,255,0.45); }
        .save-btn {
            background: rgba(140,200,255,0.08);
            border: 1px solid rgba(140,200,255,0.25);
            border-radius: 8px; color: rgba(140,200,255,0.8);
            font-size: 10px; letter-spacing: 1.5px;
            padding: 8px 14px; cursor: pointer; transition: all .2s; white-space: nowrap;
        }
        .save-btn:hover { background: rgba(140,200,255,0.16); color: #fff; }
        .save-btn:disabled { opacity: 0.3; cursor: default; }
        .name-hint { font-size: 10px; color: rgba(255,255,255,0.18); }
        .name-msg  { font-size: 10px; color: rgba(140,200,255,0.6); min-height: 12px; }

        /* ── Word chips (all words) ── */
        .word-cloud {
            display: flex; flex-wrap: wrap; gap: 8px;
        }
        .word-chip {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 20px;
            padding: 5px 13px;
            font-size: 13px; font-weight: 300; letter-spacing: 1.5px;
            transition: border-color .2s, background .2s;
            cursor: default;
        }
        .word-chip:hover {
            border-color: rgba(140,200,255,0.2);
            background: rgba(140,200,255,0.04);
        }
        .chip-flag { font-size: 11px; }
        .chip-author { font-size: 9px; color: rgba(140,200,255,0.35); letter-spacing: 1px; }

        /* ── My words ── */
        .my-words { display: flex; flex-direction: column; gap: 6px; }
        .my-word-row {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 14px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px;
            transition: border-color .2s;
        }
        .my-word-row:hover { border-color: rgba(140,200,255,0.12); }
        .my-word-text { flex: 1; font-size: 14px; font-weight: 300; letter-spacing: 1.5px; }
        .status-pill {
            font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
            padding: 2px 8px; border-radius: 20px;
        }
        .pill-ok {
            background: rgba(80,210,110,0.08);
            color: rgba(80,210,110,0.75);
            border: 1px solid rgba(80,210,110,0.18);
        }
        .pill-pending {
            background: rgba(255,175,50,0.07);
            color: rgba(255,175,50,0.65);
            border: 1px solid rgba(255,175,50,0.15);
        }
        .my-word-time { font-size: 9px; color: rgba(255,255,255,0.18); white-space: nowrap; }

        /* ── States ── */
        .empty-hint {
            padding: 24px 0;
            color: rgba(255,255,255,0.16);
            font-size: 11px; letter-spacing: 2px; text-align: center;
        }
        .loading-dots {
            color: rgba(255,255,255,0.12);
            font-size: 10px; letter-spacing: 4px; text-align: center;
            padding: 20px 0;
        }
    </style>
</head>
<body>
    <header>
        <a href="/">← galaxy</a>
        <span class="header-sep">/</span>
        <h1>Words</h1>
    </header>

    <div class="container">

        <!-- 身份 -->
        <div class="section">
            <div class="section-label">Your Identity</div>
            <div class="identity-card">
                <div class="identity-top">
                    <div class="avatar" id="avatar-el">·</div>
                    <div class="name-display" id="name-display">· · ·</div>
                    <button class="edit-btn" id="edit-name-btn">Edit</button>
                </div>
                <div class="identity-meta" id="identity-meta"></div>

                <div class="name-editor" id="name-editor">
                    <div class="name-input-row">
                        <input class="name-input" id="name-input" type="text" maxlength="30"
                               placeholder="display name" autocomplete="off" />
                        <button class="save-btn" id="save-name-btn">Save</button>
                    </div>
                    <div class="name-hint">max 30 chars · visible to all visitors</div>
                    <div class="name-msg" id="name-msg"></div>
                </div>
            </div>
        </div>

        <!-- 我的词 -->
        <div class="section">
            <div class="section-label">Your Words</div>
            <div class="my-words" id="my-word-list">
                <div class="loading-dots">loading · · ·</div>
            </div>
        </div>

        <!-- 全部公开词 -->
        <div class="section">
            <div class="section-label">All Words in the Galaxy</div>
            <div class="word-cloud" id="all-word-list">
                <div class="loading-dots">loading · · ·</div>
            </div>
        </div>

    </div>

    <script>
    /* ── Supabase ───────────────────────────────────────────────────────── */
    const SB_URL  = 'https://dibqibhjwoogkbdqsrcc.supabase.co';
    const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpYnFpYmhqd29vZ2tiZHFzcmNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMjMzNDQsImV4cCI6MjA4NzY5OTM0NH0.Wnvd9RC8kTyQQMrZcQvI2AQBoeja0nMbxKxhJwytIbI';
    const SB_HDR  = { 'apikey': SB_ANON, 'Authorization': 'Bearer ' + SB_ANON };

    /* ── 身份 ────────────────────────────────────────────────────────────── */
    let vid = localStorage.getItem('_vid');
    if (!vid) { vid = 'v_' + Math.random().toString(36).slice(2) + Date.now().toString(36); localStorage.setItem('_vid', vid); }

    let tok = localStorage.getItem('_tok');
    if (!tok) {
        const arr = crypto.getRandomValues(new Uint8Array(24));
        tok = 't_' + Array.from(arr).map(b => b.toString(16).padStart(2,'0')).join('');
        localStorage.setItem('_tok', tok);
    }

    async function sha256hex(str) {
        const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    function countryFlag(code) {
        if (!code || code.length !== 2) return '';
        return String.fromCodePoint(...[...code.toUpperCase()].map(c => c.charCodeAt(0) + 127397));
    }

    function reltime(ts) {
        const d = Date.now() - new Date(ts).getTime();
        const m = Math.floor(d / 60000), h = Math.floor(d / 3600000), days = Math.floor(d / 86400000);
        if (m < 1)    return 'just now';
        if (m < 60)   return m + 'm ago';
        if (h < 24)   return h + 'h ago';
        if (days < 30) return days + 'd ago';
        return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function esc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ── 注册访客 ────────────────────────────────────────────────────────── */
    async function ensureRegistered() {
        if (sessionStorage.getItem('_vis_reg')) return;
        try {
            const hash = await sha256hex(tok);
            let country = null, countryCode = null;
            try {
                const g = await fetch('https://ip-api.com/json?fields=country,countryCode', { cache: 'force-cache' });
                if (g.ok) { const j = await g.json(); country = j.country; countryCode = j.countryCode; }
            } catch {}
            await fetch(SB_URL + '/rest/v1/visitors', {
                method: 'POST',
                headers: { ...SB_HDR, 'Content-Type': 'application/json', 'Prefer': 'return=minimal,resolution=ignore-duplicates' },
                body: JSON.stringify({ id: vid, token_hash: hash, country, country_code: countryCode })
            });
            sessionStorage.setItem('_vis_reg', '1');
        } catch {}
    }

    /* ── 加载本人信息 ────────────────────────────────────────────────────── */
    async function loadMyInfo() {
        let displayName = 'Anonymous', country = '', countryCode = '';
        try {
            const res = await fetch(
                SB_URL + '/rest/v1/visitors?id=eq.' + encodeURIComponent(vid) + '&select=display_name,country,country_code',
                { headers: SB_HDR }
            );
            if (res.ok) {
                const rows = await res.json();
                if (rows[0]) {
                    displayName = rows[0].display_name || 'Anonymous';
                    country     = rows[0].country      || '';
                    countryCode = rows[0].country_code || '';
                }
            }
        } catch {}

        document.getElementById('name-display').textContent = displayName;
        document.getElementById('name-input').value = displayName === 'Anonymous' ? '' : displayName;

        // Avatar: first char of name
        const avatarEl = document.getElementById('avatar-el');
        avatarEl.textContent = displayName !== 'Anonymous' ? displayName[0].toUpperCase() : '?';

        const flag = countryFlag(countryCode);
        const metaEl = document.getElementById('identity-meta');
        metaEl.innerHTML = [
            `<span>${esc(vid.slice(0, 16))}…</span>`,
            country ? `<span>${flag} ${esc(country)}</span>` : ''
        ].filter(Boolean).join('');
    }

    /* ── 改名面板 ────────────────────────────────────────────────────────── */
    document.getElementById('edit-name-btn').addEventListener('click', () => {
        const ed = document.getElementById('name-editor');
        ed.classList.toggle('open');
        if (ed.classList.contains('open')) document.getElementById('name-input').focus();
    });
    document.getElementById('name-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('save-name-btn').click();
    });
    document.getElementById('save-name-btn').addEventListener('click', async () => {
        const btn     = document.getElementById('save-name-btn');
        const msg     = document.getElementById('name-msg');
        const newName = document.getElementById('name-input').value.trim();
        btn.disabled = true; msg.textContent = 'saving…';
        try {
            const res = await fetch(SB_URL + '/rest/v1/rpc/update_visitor_name', {
                method: 'POST',
                headers: { ...SB_HDR, 'Content-Type': 'application/json' },
                body: JSON.stringify({ p_visitor_id: vid, p_token: tok, p_name: newName })
            });
            if (res.ok && await res.json()) {
                const name = newName || 'Anonymous';
                document.getElementById('name-display').textContent = name;
                document.getElementById('avatar-el').textContent = name !== 'Anonymous' ? name[0].toUpperCase() : '?';
                msg.textContent = '✦ saved';
                setTimeout(() => { msg.textContent = ''; document.getElementById('name-editor').classList.remove('open'); }, 1400);
            } else {
                msg.textContent = 'verification failed';
            }
        } catch { msg.textContent = 'network error'; }
        btn.disabled = false;
    });

    /* ── 我的词 ──────────────────────────────────────────────────────────── */
    async function loadMyWords() {
        const el = document.getElementById('my-word-list');
        let myWords = [], myTimes = {};
        try {
            myWords = JSON.parse(localStorage.getItem('_my_words') || '[]');
            myTimes = JSON.parse(localStorage.getItem('_my_times') || '{}');
        } catch {}

        if (myWords.length === 0) {
            el.innerHTML = '<div class="empty-hint">no words yet · go leave one in the galaxy</div>';
            return;
        }

        let approvedSet = new Set();
        try {
            const res = await fetch(
                SB_URL + '/rest/v1/visitor_words?select=word&approved=eq.true&limit=500',
                { headers: SB_HDR }
            );
            if (res.ok) (await res.json()).forEach(r => approvedSet.add(r.word));
        } catch {}

        el.innerHTML = myWords.map(word => {
            const approved = approvedSet.has(word);
            const ts = myTimes[word];
            return `
                <div class="my-word-row">
                    <div class="my-word-text">${esc(word)}</div>
                    <span class="status-pill ${approved ? 'pill-ok' : 'pill-pending'}">
                        ${approved ? '✓ live' : 'pending'}
                    </span>
                    ${ts ? `<div class="my-word-time">${reltime(ts)}</div>` : ''}
                </div>`;
        }).join('');
    }

    /* ── 全部公开词 ──────────────────────────────────────────────────────── */
    async function loadAllWords() {
        const el = document.getElementById('all-word-list');
        try {
            const res = await fetch(
                SB_URL + '/rest/v1/visitor_words?select=word,created_at,visitor_id,source&approved=eq.true&order=sort_order.asc,created_at.asc&limit=300',
                { headers: SB_HDR }
            );
            if (!res.ok) throw new Error();
            const words = await res.json();

            if (words.length === 0) {
                el.innerHTML = '<div class="empty-hint">no words yet</div>'; return;
            }

            const vids = [...new Set(words.map(w => w.visitor_id).filter(Boolean))];
            let visitorMap = {};
            if (vids.length > 0) {
                try {
                    const vRes = await fetch(
                        SB_URL + '/rest/v1/visitors?id=in.(' + vids.map(encodeURIComponent).join(',') + ')&select=id,display_name,country_code',
                        { headers: SB_HDR }
                    );
                    if (vRes.ok) (await vRes.json()).forEach(v => { visitorMap[v.id] = v; });
                } catch {}
            }

            el.innerHTML = words.map(w => {
                const v    = visitorMap[w.visitor_id] || {};
                const flag = countryFlag(v.country_code);
                const name = w.source === 'default' || w.source === 'admin'
                    ? ''
                    : (v.display_name || 'anon·' + (w.visitor_id || '?').slice(-4));
                return `
                    <div class="word-chip">
                        ${flag ? `<span class="chip-flag">${flag}</span>` : ''}
                        <span>${esc(w.word)}</span>
                        ${name ? `<span class="chip-author">${esc(name)}</span>` : ''}
                    </div>`;
            }).join('');
        } catch {
            el.innerHTML = '<div class="empty-hint">could not load · try again later</div>';
        }
    }

    /* ── Init ────────────────────────────────────────────────────────────── */
    async function init() {
        await ensureRegistered();
        await Promise.all([ loadMyInfo(), loadMyWords(), loadAllWords() ]);
    }

    init();
    </script>
</body>
</html>
