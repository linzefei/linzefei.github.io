<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy · linzefei</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            cursor: crosshair;
        }
        canvas { display: block; }

        /* Top-left branding */
        #logo {
            position: fixed;
            top: 22px; left: 24px;
            color: rgba(255,255,255,0.35);
            font-size: 15px;
            letter-spacing: 5px;
            text-transform: lowercase;
            pointer-events: none;
            user-select: none;
        }

        /* Bottom centre hint */
        #hint {
            position: fixed;
            bottom: 24px; left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.22);
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            pointer-events: none;
            user-select: none;
            transition: opacity 1s;
        }

        /* Top-right stats */
        #stats {
            position: fixed;
            top: 22px; right: 22px;
            color: rgba(255,255,255,0.18);
            font-size: 11px;
            text-align: right;
            pointer-events: none;
            user-select: none;
            letter-spacing: 1px;
        }

        /* Click ripple */
        .ripple {
            position: fixed;
            border-radius: 50%;
            border: 1.5px solid rgba(140, 200, 255, 0.7);
            pointer-events: none;
            transform: translate(-50%, -50%) scale(0);
            animation: rippleAnim 0.9s ease-out forwards;
        }
        @keyframes rippleAnim {
            0%   { transform: translate(-50%,-50%) scale(0);  opacity: 1; }
            100% { transform: translate(-50%,-50%) scale(1);  opacity: 0; width: 160px; height: 160px; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="logo">linzefei</div>
    <div id="hint">drag to explore &nbsp;·&nbsp; scroll to zoom &nbsp;·&nbsp; click to ignite</div>
    <div id="stats">
        <div id="particle-count"></div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/galaxy.js"></script>
    <script src="js/main.js"></script>

    <script>
    // ── Click ripple + shooting star burst ─────────────────────────────────
    document.addEventListener('click', function(e) {
        // Visual ripple on screen
        const div = document.createElement('div');
        div.className = 'ripple';
        div.style.left = e.clientX + 'px';
        div.style.top  = e.clientY + 'px';
        div.style.width  = '0px';
        div.style.height = '0px';
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 950);

        // Trigger 2-4 shooting stars in the galaxy if it's ready
        if (typeof galaxy !== 'undefined' && galaxy) {
            const burst = 2 + Math.floor(Math.random() * 3);
            for (let i = 0; i < burst; i++) {
                setTimeout(() => galaxy._spawnShootingStar(), i * 80);
            }
        }
    });

    // Hide hint after 6 s
    setTimeout(() => {
        const h = document.getElementById('hint');
        if (h) h.style.opacity = '0';
    }, 6000);
    </script>
</body>
</html>
