<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy · linzefei</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            cursor: crosshair;
        }
        canvas { display: block; }

        #logo {
            position: fixed;
            top: 22px; left: 24px;
            color: rgba(255,255,255,0.35);
            font-size: 15px;
            letter-spacing: 5px;
            text-transform: lowercase;
            pointer-events: none;
            user-select: none;
        }

        #hint {
            position: fixed;
            bottom: 24px; left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.22);
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            pointer-events: none;
            user-select: none;
            transition: opacity 1s;
        }

        #stats {
            position: fixed;
            top: 22px; right: 22px;
            color: rgba(255,255,255,0.18);
            font-size: 11px;
            text-align: right;
            pointer-events: none;
            user-select: none;
            letter-spacing: 1px;
        }

        .ripple {
            position: fixed;
            border-radius: 50%;
            border: 1.5px solid rgba(140, 200, 255, 0.7);
            pointer-events: none;
            transform: translate(-50%, -50%) scale(0);
            animation: rippleAnim 0.9s ease-out forwards;
        }
        @keyframes rippleAnim {
            0%   { transform: translate(-50%,-50%) scale(0);  opacity: 1; }
            100% { transform: translate(-50%,-50%) scale(1);  opacity: 0; width: 160px; height: 160px; }
        }

        /* ── 留词按钮 ── */
        #word-btn {
            position: fixed;
            bottom: 28px; right: 28px;
            width: 44px; height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(140,200,255,0.45);
            background: rgba(0,0,0,0.55);
            color: rgba(140,200,255,0.85);
            font-size: 20px;
            line-height: 44px;
            text-align: center;
            cursor: pointer;
            backdrop-filter: blur(6px);
            transition: border-color .3s, color .3s, box-shadow .3s;
            z-index: 100;
            user-select: none;
        }
        #word-btn:hover {
            border-color: rgba(140,200,255,0.9);
            color: #fff;
            box-shadow: 0 0 14px rgba(140,200,255,0.3);
        }

        /* ── 留词面板 ── */
        #word-panel {
            position: fixed;
            bottom: 82px; right: 28px;
            width: 256px;
            background: rgba(4,4,16,0.85);
            border: 1px solid rgba(140,200,255,0.22);
            border-radius: 12px;
            padding: 16px;
            backdrop-filter: blur(14px);
            z-index: 100;
            display: none;
            flex-direction: column;
            gap: 10px;
        }
        #word-panel.open { display: flex; }

        #word-panel p {
            color: rgba(255,255,255,0.38);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #word-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(140,200,255,0.28);
            border-radius: 7px;
            color: #fff;
            font-size: 14px;
            padding: 8px 12px;
            outline: none;
            width: 100%;
            letter-spacing: 1px;
        }
        #word-input::placeholder { color: rgba(255,255,255,0.18); }
        #word-input:focus { border-color: rgba(140,200,255,0.6); }

        #word-submit {
            background: rgba(140,200,255,0.1);
            border: 1px solid rgba(140,200,255,0.38);
            border-radius: 7px;
            color: rgba(140,200,255,0.88);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 8px 0;
            cursor: pointer;
            transition: background .2s, color .2s;
        }
        #word-submit:hover   { background: rgba(140,200,255,0.2); color: #fff; }
        #word-submit:disabled { opacity: 0.35; cursor: default; }

        #word-msg {
            color: rgba(140,200,255,0.65);
            font-size: 11px;
            text-align: center;
            min-height: 14px;
            letter-spacing: 1px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="logo">linzefei <a href="/words.html" style="font-size:11px;letter-spacing:2px;color:rgba(140,200,255,0.3);text-decoration:none;margin-left:14px;vertical-align:middle;" onmouseover="this.style.color='rgba(140,200,255,0.8)'" onmouseout="this.style.color='rgba(140,200,255,0.3)'">words →</a></div>
    <div id="hint">drag to explore &nbsp;·&nbsp; scroll to zoom &nbsp;·&nbsp; click to ignite</div>
    <div id="stats">
        <div id="particle-count"></div>
        <div id="word-count"></div>
    </div>

    <div id="word-btn" title="在银河中留下你的词">✦</div>
    <div id="word-panel">
        <p>Leave a word in the galaxy</p>
        <input id="word-input" type="text" maxlength="20" placeholder="your word ..." autocomplete="off" />
        <!-- Turnstile CAPTCHA widget（compact 模式，暗色主题） -->
        <div id="cf-turnstile"
             class="cf-turnstile"
             data-sitekey="0x4AAAAAACi-7dw4QwkMDret"
             data-theme="dark"
             data-size="compact">
        </div>
        <button id="word-submit">Send to Galaxy</button>
        <div id="word-msg"></div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/galaxy.js"></script>
    <script src="js/wordParticles.js"></script>
    <script src="js/main.js"></script>

    <script>
    /* ─── Supabase 常量 ──────────────────────────────────────────────────── */
    const SB_URL  = 'https://dibqibhjwoogkbdqsrcc.supabase.co';
    const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpYnFpYmhqd29vZ2tiZHFzcmNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMjMzNDQsImV4cCI6MjA4NzY5OTM0NH0.Wnvd9RC8kTyQQMrZcQvI2AQBoeja0nMbxKxhJwytIbI';
    const SB_HDR  = { 'apikey': SB_ANON, 'Authorization': 'Bearer ' + SB_ANON };

    /* ─── CF Worker 地址（部署 Worker 后填入，占位符期间提交会失败）────────── */
    const WORKER_URL = 'WORKER_URL_PLACEHOLDER';

    /* ─── 游客 ID + 安全 Token ───────────────────────────────────────────── */
    let vid = localStorage.getItem('_vid');
    if (!vid) {
        vid = 'v_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
        localStorage.setItem('_vid', vid);
    }
    let tok = localStorage.getItem('_tok');
    if (!tok) {
        const arr = crypto.getRandomValues(new Uint8Array(24));
        tok = 't_' + Array.from(arr).map(b => b.toString(16).padStart(2, '0')).join('');
        localStorage.setItem('_tok', tok);
    }

    /* ─── 工具：SHA-256 哈希 ─────────────────────────────────────────────── */
    async function sha256hex(str) {
        const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    /* ─── 注册访客身份（首次或跨页面）─────────────────────────────────────── */
    async function ensureVisitorRegistered() {
        if (sessionStorage.getItem('_vis_reg')) return;
        try {
            const hash = await sha256hex(tok);
            // 检测国家（ip-api.com 免费，无需 key）
            let country = null, countryCode = null;
            try {
                const geo = await fetch('https://ip-api.com/json?fields=country,countryCode', { cache: 'force-cache' });
                if (geo.ok) { const g = await geo.json(); country = g.country; countryCode = g.countryCode; }
            } catch {}
            await fetch(SB_URL + '/rest/v1/visitors', {
                method: 'POST',
                headers: { ...SB_HDR, 'Content-Type': 'application/json', 'Prefer': 'return=minimal,resolution=ignore-duplicates' },
                body: JSON.stringify({ id: vid, token_hash: hash, country, country_code: countryCode })
            });
            sessionStorage.setItem('_vis_reg', '1');
        } catch {}
    }

    /* ─── 访问统计 ───────────────────────────────────────────────────────── */
    (function() {
        fetch(SB_URL + '/rest/v1/page_visits', {
            method: 'POST',
            headers: { ...SB_HDR, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
            body: JSON.stringify({
                visitor_id: vid,
                date: new Date().toISOString().slice(0, 10),
                referrer: document.referrer || null,
                user_agent: navigator.userAgent,
                page: location.pathname
            })
        }).catch(() => {});
    })();

    /* ─── Click ripple + shooting star ──────────────────────────────────── */
    document.addEventListener('click', function(e) {
        if (e.target.closest('#word-panel') || e.target.id === 'word-btn') return;
        const div = document.createElement('div');
        div.className = 'ripple';
        div.style.cssText = `left:${e.clientX}px;top:${e.clientY}px;width:0;height:0`;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 950);

        if (typeof galaxy !== 'undefined' && galaxy) {
            const n = 2 + Math.floor(Math.random() * 3);
            for (let i = 0; i < n; i++) setTimeout(() => galaxy._spawnShootingStar(), i * 80);
        }
    });

    setTimeout(() => {
        const h = document.getElementById('hint');
        if (h) h.style.opacity = '0';
    }, 6000);

    /* ─── 留词面板交互 ───────────────────────────────────────────────────── */
    const wordBtn   = document.getElementById('word-btn');
    const wordPanel = document.getElementById('word-panel');
    const wordInput = document.getElementById('word-input');
    const wordSub   = document.getElementById('word-submit');
    const wordMsg   = document.getElementById('word-msg');

    wordBtn.addEventListener('click', () => {
        wordPanel.classList.toggle('open');
        if (wordPanel.classList.contains('open')) wordInput.focus();
    });
    wordInput.addEventListener('keydown', e => { if (e.key === 'Enter') wordSub.click(); });

    wordSub.addEventListener('click', async () => {
        const word = wordInput.value.trim();
        if (!word) return;

        // 获取 Turnstile token
        const tsToken = typeof turnstile !== 'undefined'
            ? turnstile.getResponse(document.getElementById('cf-turnstile'))
            : null;
        if (!tsToken) {
            wordMsg.textContent = 'please complete verification';
            return;
        }

        wordSub.disabled = true;
        wordMsg.textContent = 'sending...';
        try {
            const res = await fetch(WORKER_URL + '/submit-word', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ word, visitor_id: vid, turnstile_token: tsToken })
            });
            if (res.ok) {
                wordMsg.textContent = '✦ entering your galaxy...';
                wordInput.value = '';
                // Turnstile token 一次性，重置 widget
                if (typeof turnstile !== 'undefined') {
                    turnstile.reset(document.getElementById('cf-turnstile'));
                }
                // 本人立刻看到：加入队列 + 存入 localStorage
                saveMyWord(word);
                wordQueue.unshift(word);
                updateWordCount();
                setTimeout(() => {
                    wordMsg.textContent = '';
                    wordPanel.classList.remove('open');
                }, 2000);
            } else {
                const err = await res.json().catch(() => ({}));
                wordMsg.textContent = err.error === 'captcha failed' ? 'verification failed – try again' : 'failed – try again';
                if (typeof turnstile !== 'undefined') turnstile.reset(document.getElementById('cf-turnstile'));
            }
        } catch { wordMsg.textContent = 'network error'; }
        wordSub.disabled = false;
    });

    /* ─── 本人提交词持久化（localStorage）────────────────────────────────── */
    const MY_WORDS_KEY = '_my_words';
    const MY_TIMES_KEY = '_my_times';
    function saveMyWord(word) {
        const list = getMyWords();
        if (!list.includes(word)) {
            list.unshift(word);
            localStorage.setItem(MY_WORDS_KEY, JSON.stringify(list.slice(0, 20)));
        }
        // 记录提交时间（已有的不覆盖）
        const times = JSON.parse(localStorage.getItem(MY_TIMES_KEY) || '{}');
        if (!times[word]) {
            times[word] = new Date().toISOString();
            localStorage.setItem(MY_TIMES_KEY, JSON.stringify(times));
        }
    }
    function getMyWords() {
        try { return JSON.parse(localStorage.getItem(MY_WORDS_KEY) || '[]'); } catch { return []; }
    }

    /* ─── 粒子文字队列系统 ───────────────────────────────────────────────── */
    let wordQueue   = [];   // 待显示单词列表
    let activeWord  = null; // 当前 WordParticles 实例
    let queueIndex  = 0;
    let wordScene   = null;
    let wordCamera  = null;

    // 内置默认词（兜底：数据库未配置时使用）
    const DEFAULT_WORDS = [
        'Hello World!', 'Three.js', 'JavaScript', 'Python',
        'Java', 'C++', 'React', 'Vue', 'Angular', 'Node.js',
        'linzefei', 'Cursor', '2025'
    ];

    function updateWordCount() {
        const el = document.getElementById('word-count');
        if (el) el.textContent = wordQueue.length + ' words';
    }

    async function fetchWords() {
        let dbWords = [];
        try {
            const res = await fetch(
                SB_URL + '/rest/v1/visitor_words?select=word,sort_order&approved=eq.true&order=sort_order.asc,created_at.asc&limit=200',
                { headers: SB_HDR }
            );
            if (res.ok) {
                const rows = await res.json();
                dbWords = rows.map(r => r.word);
            }
        } catch {}

        // 本人提交过的词（已审或待审都给自己看）
        const myWords = getMyWords();

        // 合并：自己的词优先排在前面，去重
        const merged = [...new Set([...myWords, ...(dbWords.length ? dbWords : DEFAULT_WORDS)])];
        wordQueue = merged;
        updateWordCount();
    }

    function tickWordQueue() {
        if (!wordScene || !wordCamera || wordQueue.length === 0) return;

        // 推进当前词
        if (activeWord) {
            activeWord.update();
            if (!activeWord.isDone()) return;
            activeWord = null;
            queueIndex = (queueIndex + 1) % wordQueue.length;
        }

        // 启动下一个词
        const nextWord = wordQueue[queueIndex];
        if (nextWord) {
            activeWord = new WordParticles(nextWord, wordScene, wordCamera);
        }
    }

    /* ─── 等待 main.js 完成初始化后接入 ─────────────────────────────────── */
    window.addEventListener('load', () => {
        // 注册访客（后台静默，不阻塞渲染）
        ensureVisitorRegistered();

        requestAnimationFrame(() => {
            wordScene  = scene;   // 来自 main.js 全局变量
            wordCamera = camera;
            fetchWords().then(() => {
                // 延迟 1s 再开始，让银河先渲染出来
                setTimeout(() => {
                    tickWordQueue();
                }, 1000);
            });
        });
    });

    /* ─── 把 tickWordQueue 挂入渲染循环 ─────────────────────────────────── */
    // main.js 的 animate() 每帧调用 galaxy.update()，我们在此基础上追加
    window._wordTick = tickWordQueue;
    </script>
</body>
</html>
