<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · linzefei</title>
  <link rel="stylesheet" href="css/admin.css">
  <style>
    .gh-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px;
      background: #fff;
      color: #0d1117;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .gh-btn:hover { opacity: .9; }
    .gh-btn:active { transform: scale(.97); }
    .gh-btn svg { width: 20px; height: 20px; }
    .divider-line {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--muted);
      font-size: 11px;
    }
    .divider-line::before,
    .divider-line::after {
      content: '';
      flex: 1;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <div class="brand">linzefei</div>
      <div class="tag">Admin Console</div>
    </div>

    <button class="gh-btn" onclick="doGitHubLogin()">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
      </svg>
      Continue with GitHub
    </button>

    <div class="error-msg" id="errMsg"></div>
  </div>
</div>

<script src="../js/api-config.js"></script>
<script src="js/auth.js"></script>
<script>
// 1. 处理 GitHub OAuth 回调（URL hash 里有 access_token）
if (sb.handleOAuthCallback()) {
    location.href = '/admin/dashboard.html';
}
// 2. 已登录直接跳
else if (sb.isLoggedIn()) {
    sb.getUser()
      .then(u => { if (u) location.href = '/admin/dashboard.html'; })
      .catch(() => {});
}

function doGitHubLogin() {
    document.getElementById('errMsg').textContent = '';
    sb.signInWithGitHub();
}
</script>
</body>
</html>
