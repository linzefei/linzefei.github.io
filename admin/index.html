<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · linzefei</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <div class="brand">linzefei</div>
      <div class="tag">Admin Console</div>
    </div>

    <div class="form-group">
      <label>邮箱</label>
      <input type="email" id="email" placeholder="admin@example.com" autocomplete="username">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">登录</button>
    <div class="error-msg" id="errMsg"></div>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
// Already logged in?
if (sb.isLoggedIn()) {
    sb.getUser().then(u => { if (u) location.href = '/admin/dashboard.html'; }).catch(() => {});
}

// Enter key
document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
});
document.getElementById('email').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('password').focus();
});

async function doLogin() {
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errMsg');
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('password').value;
    err.textContent = '';
    if (!email || !pass) { err.textContent = '请填写邮箱和密码'; return; }
    btn.textContent = '登录中…';
    btn.disabled = true;
    try {
        await sb.signIn(email, pass);
        location.href = '/admin/dashboard.html';
    } catch (e) {
        err.textContent = e.message.includes('Invalid') ? '邮箱或密码错误' : e.message;
        btn.textContent = '登录';
        btn.disabled = false;
    }
}
</script>
</body>
</html>
